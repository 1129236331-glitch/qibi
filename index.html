<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0; url=ai-tools.html">
<title>奇笔AI 2.0 · 智能创作工具集</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
    background: #FAFAFD;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; margin: 0;
  }
  .loader {
    text-align: center;
  }
  .loader h1 {
    font-size: 24px; font-weight: 700;
    background: linear-gradient(135deg, #534AB7, #C42D5A);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }
  .loader p { color: #999; font-size: 14px; }
  .dots {
    display: inline-flex; gap: 6px; margin-top: 16px;
  }
  .dots span {
    width: 8px; height: 8px; border-radius: 50%;
    background: linear-gradient(135deg, #7F77DD, #E85D8A);
    animation: bounce 1.4s ease-in-out infinite both;
  }
  .dots span:nth-child(1) { animation-delay: -0.32s; }
  .dots span:nth-child(2) { animation-delay: -0.16s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }
</style>
</head>
<body>
  <div class="loader">
    <h1>奇笔AI 2.0</h1>
    <p>正在跳转至智能创作工具...</p>
    <div class="dots"><span></span><span></span><span></span></div>
    <p style="margin-top:20px;font-size:12px;">
      <a href="ai-tools.html" style="color:#534AB7;">如果没有自动跳转，请点击这里</a>
    </p>
  </div>
</body>
</html>
