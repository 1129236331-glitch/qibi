<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>奇笔 AI · 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0f0f14;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{width:100%;max-width:480px;padding:20px}
.card{background:#1a1a25;border-radius:16px;padding:32px;border:1px solid #2a2a3a}
h1{font-size:22px;margin-bottom:4px;color:#fff}
.subtitle{font-size:13px;color:#777;margin-bottom:28px}
.label{display:block;font-size:13px;color:#999;margin-bottom:6px}
.input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #333;background:#12121a;color:#e0e0e0;font-size:14px;outline:none;transition:border .2s}
.input:focus{border-color:#6c5ce7}
.btn{width:100%;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#6c5ce7;color:#fff;margin-top:12px}
.btn-primary:hover{background:#7c6cf7}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-danger{background:transparent;color:#f87171;border:1px solid #3a1a1a;margin-top:8px}
.btn-danger:hover{background:#2a1010}
.status{display:flex;align-items:center;gap:8px;padding:12px 14px;border-radius:10px;margin-bottom:20px;font-size:14px}
.status-ok{background:#0d2818;border:1px solid #1a5c30;color:#4ade80}
.status-empty{background:#1a1a0d;border:1px solid #5c4a1a;color:#facc15}
.dot{width:8px;height:8px;border-radius:50%}
.dot-ok{background:#4ade80}
.dot-empty{background:#facc15}
.key-display{font-family:'SF Mono',monospace;font-size:14px;padding:10px 14px;background:#12121a;border-radius:8px;border:1px solid #2a2a3a;word-break:break-all}
.form-group{margin-bottom:16px}
.divider{height:1px;background:#2a2a3a;margin:24px 0}
.err{color:#f87171;font-size:13px;margin-top:8px;display:none}
.msg{font-size:13px;margin-top:8px;display:none}
.msg-ok{color:#4ade80}
.msg-err{color:#f87171}
.hidden{display:none}
.logout{text-align:right;margin-bottom:16px}
.logout a{color:#666;font-size:13px;text-decoration:none}
.logout a:hover{color:#999}
.help-box{background:#12121a;border:1px solid #2a2a3a;border-radius:10px;padding:14px;margin-top:20px;font-size:12px;color:#666;line-height:1.8}
.help-box a{color:#6c5ce7;text-decoration:none}
.help-box code{color:#888;background:#0a0a0f;padding:1px 6px;border-radius:4px;font-size:11px}
</style>
</head>
<body>
<div class="container">

  <!-- 登录视图 -->
  <div class="card" id="login-view">
    <h1>奇笔 AI 管理后台</h1>
    <p class="subtitle">请输入管理密码以继续</p>
    <form id="login-form">
      <div class="form-group">
        <label class="label">管理密码</label>
        <input type="password" class="input" id="password" placeholder="输入管理密码" autofocus>
      </div>
      <button type="submit" class="btn btn-primary">登录</button>
      <div class="err" id="login-err"></div>
    </form>
    <div class="help-box" style="margin-top:20px">
      默认密码：<code>qibi2024</code>（首次登录后可在下方修改）
    </div>
  </div>

  <!-- 仪表盘视图 -->
  <div class="card hidden" id="dash-view">
    <div class="logout"><a href="#" id="logout-btn">退出登录</a></div>
    <h1>奇笔 AI 管理后台</h1>
    <p class="subtitle">API Key · 密码管理</p>

    <!-- Key 状态 -->
    <div class="status" id="key-status">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">检查中...</span>
    </div>
    <div id="key-info" class="hidden">
      <label class="label">当前 Key</label>
      <div class="key-display" id="current-key">---</div>
    </div>

    <!-- 更新 Key -->
    <div class="divider"></div>
    <form id="update-form">
      <div class="form-group">
        <label class="label">更新 DeepSeek API Key</label>
        <input type="password" class="input" id="new-key" placeholder="粘贴 DeepSeek API Key（sk-开头）">
      </div>
      <button type="submit" class="btn btn-primary">保存 Key</button>
      <button type="button" class="btn btn-danger" id="clear-key-btn">清除 Key</button>
      <div class="msg" id="update-msg"></div>
    </form>

    <!-- 修改密码 -->
    <div class="divider"></div>
    <form id="pw-form">
      <div class="form-group">
        <label class="label">修改管理密码</label>
        <input type="password" class="input" id="new-pw" placeholder="输入新密码（留空不修改）">
      </div>
      <button type="submit" class="btn btn-primary" style="background:#444;margin-top:8px">更新密码</button>
      <div class="msg" id="pw-msg"></div>
    </form>

    <!-- 帮助信息 -->
    <div class="help-box">
      <p><strong>获取 DeepSeek API Key：</strong></p>
      <p>1. 访问 <a href="https://platform.deepseek.com/api_keys" target="_blank">platform.deepseek.com</a></p>
      <p>2. 注册/登录后，点击「创建 API Key」</p>
      <p>3. 复制 Key（以 <code>sk-</code> 开头）粘贴到上方</p>
      <p style="margin-top:8px;color:#555">Key 仅保存在你的浏览器本地，不会上传到任何服务器。</p>
    </div>
  </div>

</div>

<script>
// ====== 常量 ======
const STORAGE_KEY = 'qibi_deepseek_key';
const PW_KEY = 'qibi_admin_pw';
const TOKEN_KEY = 'qibi_admin_token';
const DEFAULT_PW = 'qibi2024';

// ====== 初始化 ======
var token = localStorage.getItem(TOKEN_KEY);
if (token) showDashboard();

// ====== 登录 ======
document.getElementById('login-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var pw = document.getElementById('password').value.trim();
  var errEl = document.getElementById('login-err');
  errEl.style.display = 'none';

  if (!pw) { errEl.textContent = '请输入密码'; errEl.style.display = 'block'; return; }

  var savedPw = localStorage.getItem(PW_KEY) || DEFAULT_PW;
  if (pw === savedPw) {
    token = pw;
    localStorage.setItem(TOKEN_KEY, token);
    showDashboard();
  } else {
    errEl.textContent = '密码错误';
    errEl.style.display = 'block';
  }
});

// ====== 登出 ======
document.getElementById('logout-btn').addEventListener('click', function(e) {
  e.preventDefault();
  localStorage.removeItem(TOKEN_KEY);
  token = null;
  document.getElementById('login-view').classList.remove('hidden');
  document.getElementById('dash-view').classList.add('hidden');
  document.getElementById('password').value = '';
  document.getElementById('new-key').value = '';
  document.getElementById('new-pw').value = '';
});

// ====== 更新 API Key ======
document.getElementById('update-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var key = document.getElementById('new-key').value.trim();
  var msgEl = document.getElementById('update-msg');
  msgEl.style.display = 'none';

  if (!key) { showMsg('update-msg', 'msg-err', '请输入 API Key'); return; }
  if (!key.startsWith('sk-')) { showMsg('update-msg', 'msg-err', 'Key 格式不正确，应以 sk- 开头'); return; }

  localStorage.setItem(STORAGE_KEY, key);
  showMsg('update-msg', 'msg-ok', 'API Key 已保存（仅存储在本地浏览器）');
  document.getElementById('new-key').value = '';
  loadKeyStatus();
});

// ====== 清除 Key ======
document.getElementById('clear-key-btn').addEventListener('click', function() {
  if (!confirm('确定要清除 API Key 吗？清除后 AI 写作功能将无法使用。')) return;
  localStorage.removeItem(STORAGE_KEY);
  showMsg('update-msg', 'msg-ok', 'API Key 已清除');
  loadKeyStatus();
});

// ====== 修改密码 ======
document.getElementById('pw-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var newPw = document.getElementById('new-pw').value.trim();
  if (!newPw) { showMsg('pw-msg', 'msg-err', '请输入新密码'); return; }
  if (newPw.length < 4) { showMsg('pw-msg', 'msg-err', '密码至少 4 个字符'); return; }

  localStorage.setItem(PW_KEY, newPw);
  localStorage.setItem(TOKEN_KEY, newPw);
  token = newPw;
  showMsg('pw-msg', 'msg-ok', '密码已更新');
  document.getElementById('new-pw').value = '';
});

// ====== 视图切换 ======
function showDashboard() {
  document.getElementById('login-view').classList.add('hidden');
  document.getElementById('dash-view').classList.remove('hidden');
  document.getElementById('password').value = '';
  loadKeyStatus();
}

// ====== 加载 Key 状态 ======
function loadKeyStatus() {
  var key = localStorage.getItem(STORAGE_KEY);
  var statusEl = document.getElementById('key-status');
  var dot = document.getElementById('status-dot');
  var text = document.getElementById('status-text');
  var info = document.getElementById('key-info');
  var curKey = document.getElementById('current-key');

  if (key) {
    statusEl.className = 'status status-ok';
    dot.className = 'dot dot-ok';
    text.textContent = 'API Key 已配置';
    info.classList.remove('hidden');
    // 脱敏显示
    curKey.textContent = key.substring(0, 7) + '****' + key.substring(key.length - 4);
  } else {
    statusEl.className = 'status status-empty';
    dot.className = 'dot dot-empty';
    text.textContent = 'API Key 未配置 — AI 写作功能不可用';
    info.classList.add('hidden');
  }
}

// ====== 工具函数 ======
function showMsg(elId, className, text) {
  var el = document.getElementById(elId);
  el.textContent = text;
  el.className = 'msg ' + className;
  el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, 4000);
}
</script>
</body>
</html>
